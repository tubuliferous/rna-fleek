name: Build Desktop Apps

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
  push:
    tags:
      - 'v*'  # Auto-build on version tags

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build EXE
        run: python -m PyInstaller fleek_win.spec --noconfirm

      - name: Zip artifact
        run: Compress-Archive -Path dist/RNA-FLEEK -DestinationPath RNA-FLEEK-Windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RNA-FLEEK-Windows
          path: RNA-FLEEK-Windows.zip
          retention-days: 90

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build App
        run: python -m PyInstaller fleek_mac.spec --noconfirm

      - name: Zip artifact
        run: cd dist && zip -r ../RNA-FLEEK-Mac.zip RNA-FLEEK.app/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RNA-FLEEK-Mac
          path: RNA-FLEEK-Mac.zip
          retention-days: 90

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libigraph-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install pyinstaller
          pip install -r requirements.txt

      - name: Build executable
        run: python -m PyInstaller fleek_linux.spec --noconfirm

      - name: Zip artifact
        run: cd dist && tar -czf ../RNA-FLEEK-Linux.tar.gz RNA-FLEEK/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RNA-FLEEK-Linux
          path: RNA-FLEEK-Linux.tar.gz
          retention-days: 90

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/RNA-FLEEK-Windows/RNA-FLEEK-Windows.zip
            artifacts/RNA-FLEEK-Mac/RNA-FLEEK-Mac.zip
            artifacts/RNA-FLEEK-Linux/RNA-FLEEK-Linux.tar.gz
